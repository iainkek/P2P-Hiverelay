<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HiveRelay Observatory</title>
  <style>
    :root {
      --bg: #0a0e14;
      --panel: #14181f;
      --panel-edge: #2a2e34;
      --up: #81c784;
      --down: #ef5350;
      --warn: #ffa726;
      --text: #d4d4d4;
      --muted: #6b7280;
      --accent: #4fc3f7;
      --pubkey-bg: #1a1f26;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "SF Pro Text", BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      margin: 0; padding: 20px;
      background: var(--bg); color: var(--text);
      font-size: 14px; line-height: 1.5;
    }
    h1 { color: var(--accent); margin: 0 0 4px; font-size: 1.4em; }
    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
    .updated { color: var(--muted); font-size: 0.85em; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 12px; }
    .relay {
      border: 1px solid var(--panel-edge);
      background: var(--panel);
      border-radius: 6px;
      padding: 14px;
    }
    .relay.down { border-color: var(--down); background: #1f1414; }
    .relay-header {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 10px;
    }
    .relay-name { font-size: 1.1em; font-weight: 600; color: var(--up); }
    .relay.down .relay-name { color: var(--down); }
    .relay-meta { color: var(--muted); font-size: 0.8em; }
    .stats { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 10px; }
    .stat { font-size: 0.9em; }
    .stat-label { color: var(--muted); font-size: 0.75em; text-transform: uppercase; letter-spacing: 0.04em; }
    .stat-value { font-weight: 600; font-size: 1.05em; }
    .stat-value.up { color: var(--up); }
    .stat-value.down { color: var(--down); }
    .stat-value.warn { color: var(--warn); }
    .peers { margin-top: 10px; }
    .peers-label { color: var(--muted); font-size: 0.75em; text-transform: uppercase; margin-bottom: 4px; }
    .pubkey {
      display: inline-block; background: var(--pubkey-bg); padding: 2px 6px;
      border-radius: 3px; margin: 2px 2px 2px 0; font-family: "SF Mono", monospace;
      font-size: 0.78em; color: var(--accent);
    }
    .pubkey.unknown { color: var(--warn); }
    .pubkey.self { color: var(--muted); }
    .errors { margin-top: 8px; color: var(--down); font-size: 0.8em; }
    .apps-summary { color: var(--muted); font-size: 0.85em; margin-top: 8px; }
    .footer { margin-top: 24px; color: var(--muted); font-size: 0.78em; }
    code { font-family: "SF Mono", monospace; background: var(--pubkey-bg); padding: 1px 4px; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>HiveRelay Observatory</h1>
      <div class="updated" id="updated">Loading…</div>
    </div>
    <div class="updated">
      Poll: <span id="poll-interval">…</span>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="footer">
    v0.1 · pull-model from each relay's <code>/health</code>, <code>/peers</code>, <code>/status</code>, <code>/catalog.json</code>, <code>/.well-known/hiverelay.json</code> · in-memory snapshot only · <code>/api/state</code> for raw JSON
  </div>
  <script src="/public/app.js"></script>
</body>
</html>
